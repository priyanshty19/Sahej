<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sahej — benefit co-pilot for ASHA workers</title>
<meta name="description" content="Every benefit a new mother is owed — as a dated checklist on the ASHA's visit schedule. Works offline.">
<meta name="theme-color" content="#0f7b6c">
<meta property="og:title" content="Sahej — benefit co-pilot for ASHA workers">
<meta property="og:description" content="Every rupee a new mother is owed, on the days you already visit.">
<meta property="og:type" content="website">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  :root{
    --bg:#f6f4ef; --panel:#fff; --ink:#1d2421; --muted:#6b7670; --line:#e4e0d7;
    --brand:#0f7b6c; --brand-soft:#e2f1ee; --gold:#b9821f; --gold-soft:#f7eed9;
    --rail:#cfd8d4; --danger:#a4453a; --danger-soft:#f5e2df; --orange:#c2701c;
    --orange-soft:#f8ead7; --info:#2f6dab; --info-soft:#e2ecf6; --purple:#6b5ca8;
    --purple-soft:#ece9f5; --ok:#1f7a52;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.45}
  header{background:var(--brand);color:#fff;padding:14px 20px;display:flex;align-items:center;
    justify-content:space-between;gap:12px;flex-wrap:wrap}
  header.sensitive{background:#4a5568}
  header h1{margin:0;font-size:19px}
  header p{margin:2px 0 0;font-size:12.5px;opacity:.9;max-width:560px}
  .hbtns{display:flex;gap:8px}
  .hbtns button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);
    padding:6px 11px;border-radius:8px;font-size:12.5px;cursor:pointer}
  .hbtns button:hover{background:rgba(255,255,255,.28)}
  .wrap{max-width:1180px;margin:0 auto;padding:18px;display:grid;grid-template-columns:300px 360px 1fr;gap:16px}
  @media(max-width:1080px){.wrap{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .panel h2{margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  label{display:block;font-size:12px;color:var(--muted);margin:9px 0 3px}
  select,input{width:100%;padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;background:#fff;color:var(--ink)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .check{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:12.5px}
  .check input{width:auto}
  details{margin-top:10px;border-top:1px dashed var(--line);padding-top:6px}
  summary{cursor:pointer;font-size:12.5px;color:var(--brand);font-weight:600}
  .btn{width:100%;margin-top:12px;background:var(--brand);color:#fff;border:none;padding:10px;
    border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer}
  .btn.sec{background:#fff;color:var(--brand);border:1px solid var(--brand)}
  /* caseload */
  .case{display:flex;justify-content:space-between;align-items:center;padding:9px 10px;border:1px solid var(--line);
    border-radius:10px;margin-bottom:7px;cursor:pointer;font-size:13px}
  .case:hover{border-color:var(--brand)}
  .case.active{background:var(--brand-soft);border-color:var(--brand)}
  .case small{color:var(--muted);display:block;font-size:11px}
  .case .del{color:var(--danger);background:none;border:none;cursor:pointer;font-size:13px;padding:2px 5px}
  .empty{font-size:12.5px;color:var(--muted);padding:6px 2px}
  /* results */
  .summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .stat{flex:1;min-width:130px;background:var(--brand-soft);border-radius:12px;padding:13px}
  .stat .big{font-size:24px;font-weight:700;color:var(--brand)}
  .stat .lbl{font-size:11.5px;color:var(--muted);margin-top:2px}
  .profile-line{font-size:12.5px;color:var(--muted);margin-bottom:12px}
  .alert{border-radius:10px;padding:9px 12px;margin-bottom:8px;font-size:12.5px;border:1px solid}
  .a-blocker,.a-overdue{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
  .a-urgent{background:var(--orange-soft);border-color:var(--orange);color:var(--orange)}
  .a-warn{background:var(--info-soft);border-color:var(--info);color:var(--info)}
  .a-sensitive{background:var(--purple-soft);border-color:var(--purple);color:var(--purple)}
  .a-stuck{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
  /* tabs */
  .tabs{display:flex;gap:6px;margin-bottom:12px}
  .tabs button{flex:1;padding:9px 10px;border:1px solid var(--line);background:#fff;border-radius:9px;
    font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
  .tabs button.on{background:var(--brand);border-color:var(--brand);color:#fff}
  /* today plan */
  .prow{border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:8px;cursor:pointer;background:#fff}
  .prow:hover{border-color:var(--brand)}
  .prow .top{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .prow .nm{font-weight:600;font-size:14px}
  .prow .day{font-size:12px;color:var(--muted)}
  .prow .chips{margin-top:5px;display:flex;gap:5px;flex-wrap:wrap}
  .prow ul{margin:7px 0 0;padding-left:18px}
  .prow li{font-size:12px;color:var(--muted);margin:2px 0}
  .chip2{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px}
  .c-over{background:var(--danger-soft);color:var(--danger)}
  .c-stuck{background:var(--danger-soft);color:var(--danger)}
  .c-urg{background:var(--orange-soft);color:var(--orange)}
  .c-visit{background:var(--brand-soft);color:var(--brand)}
  .c-cash{background:var(--gold-soft);color:var(--gold)}
  /* card action buttons */
  .abtns{margin-top:7px;display:flex;gap:6px;flex-wrap:wrap}
  .abtn{border:1px solid var(--brand);background:#fff;color:var(--brand);border-radius:8px;
    padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer}
  .abtn.warn{border-color:var(--danger);color:var(--danger)}
  .b-applied{background:var(--info-soft);color:var(--info)}
  .b-stuck{background:var(--danger-soft);color:var(--danger)}
  .tools{display:flex;gap:6px;margin-top:10px}
  .tools button{flex:1;border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 4px;
    font-size:11.5px;color:var(--muted);cursor:pointer}
  .tools button:hover{border-color:var(--brand);color:var(--brand)}
  .visit{position:relative;padding:0 0 2px 24px;margin-bottom:16px}
  .visit::before{content:"";position:absolute;left:6px;top:20px;bottom:-12px;width:2px;background:var(--rail)}
  .visit:last-child::before{display:none}
  .dot{position:absolute;left:0;top:3px;width:15px;height:15px;border-radius:50%;background:var(--brand);
    border:3px solid var(--panel);box-shadow:0 0 0 1px var(--rail)}
  .visit h3{margin:0 0 7px;font-size:13.5px}
  .card{border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:7px;background:#fff;display:flex;gap:10px;align-items:flex-start}
  .card.done{opacity:.62}
  .card .cb{flex:0 0 auto;width:15px;height:15px;margin-top:3px}
  .card .body{flex:1}
  .card .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .card .title{font-weight:600;font-size:13.5px}
  .card.done .title{text-decoration:line-through}
  .card .hi{font-size:12px;color:var(--muted);margin-top:1px}
  .card .scheme{font-size:11.5px;color:var(--muted);margin-top:4px}
  .cash{white-space:nowrap;font-weight:700;color:var(--brand);font-size:13.5px}
  .meta2{margin-top:6px;font-size:11.5px;color:var(--muted)}
  .meta2 b{color:var(--ink)}
  .badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;
    padding:2px 6px;border-radius:20px;margin-right:5px}
  .b-gate{background:var(--gold-soft);color:var(--gold)}
  .b-verify{background:var(--danger-soft);color:var(--danger)}
  .b-overdue{background:var(--danger-soft);color:var(--danger)}
  .b-urgent{background:var(--orange-soft);color:var(--orange)}
  .b-blocked{background:var(--gold-soft);color:var(--gold)}
  .b-done{background:var(--brand-soft);color:var(--ok)}
  .b-deadline{background:var(--brand-soft);color:var(--brand)}
  .docs li{font-size:12.5px;margin:3px 0}
  .docs small{color:var(--muted)}
  .none{font-size:12.5px;color:var(--muted);background:#faf8f3;border:1px dashed var(--line);border-radius:11px;padding:9px 11px;margin-top:8px}
  .none b{color:var(--ink)}
  footer{max-width:1180px;margin:0 auto;padding:4px 20px 28px;font-size:11px;color:var(--muted)}
  /* a11y + touch */
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:4px}
  .offline{display:none;background:#4a5568;color:#fff;text-align:center;font-size:12.5px;padding:6px 10px}
  .offline.on{display:block}
  @media(max-width:640px){
    select,input{padding:11px 10px;font-size:15px}   /* ≥44px touch targets, no iOS zoom */
    .btn{padding:13px}
    .hbtns button{padding:9px 13px;font-size:13.5px}
    .card .cb{width:20px;height:20px}
    .stat .big{font-size:21px}
  }
  @media print{.panel.form,.panel.case-panel,header .hbtns,.offline{display:none}.wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="offline" id="offlineBanner" role="status">Offline — showing saved data. Changes still work; they sync from your phone's storage.</div>
<header id="hdr">
  <div>
    <a href="/" style="color:inherit;text-decoration:none" title="Back to home"><h1 id="t-title" style="margin:0">Sahej · सहज</h1></a>
    <p id="t-tag">A benefit co-pilot for the ASHA worker — every rupee a new mother is owed, on the days you already visit.</p>
  </div>
  <div class="hbtns">
    <button id="langBtn">हिन्दी</button>
    <button id="shareBtn">Share</button>
    <button id="printBtn">Print</button>
  </div>
</header>

<div class="wrap">
  <!-- CASELOAD -->
  <div class="panel case-panel">
    <h2 id="t-caseload">My caseload</h2>
    <div id="caseList"></div>
    <button class="btn sec" id="newBtn">+ New mother</button>
    <div class="tools">
      <button id="backupBtn" title="Download caseload backup (JSON)">Backup</button>
      <button id="restoreBtn" title="Restore caseload from a backup file">Restore</button>
      <button id="csvBtn" title="Download block report (CSV)">Report CSV</button>
    </div>
    <input type="file" id="restoreFile" accept="application/json,.json" hidden>
  </div>

  <!-- FORM -->
  <form class="panel form" id="form">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2 id="t-mother" style="margin:0">This mother</h2>
      <button type="button" id="micBtn" class="abtn" hidden aria-label="Voice input">🎤 <span id="t-voice">Speak</span></button>
    </div>
    <div id="voiceOut" class="none" hidden style="margin:8px 0 0"></div>
    <label id="l-event" for="life_event">Life event</label>
    <select id="life_event">
      <option value="childbirth">Childbirth</option>
      <option value="death">Death in family</option>
    </select>
    <label id="l-name" for="name">Name / ID</label>
    <input id="name" placeholder="e.g. Sunita (ward 4)" autocomplete="off" maxlength="60">
    <label id="l-state" for="state">Home state / UT</label>
    <select id="state"></select>

    <div id="deathFields" hidden>
      <div class="row">
        <div><label id="l-ddate" for="d_death_date">Date of death</label><input type="date" id="d_death_date"></div>
        <div><label id="l-darea" for="d_area">Area</label><select id="d_area"></select></div>
      </div>
      <div class="row">
        <div><label id="l-decage" for="d_deceased_age_years">Deceased's age</label><input type="number" id="d_deceased_age_years" value="45" min="0" max="120"></div>
        <div><label id="l-appage" for="d_applicant_age_years">Applicant's age</label><input type="number" id="d_applicant_age_years" value="40" min="10" max="110"></div>
      </div>
      <div class="row">
        <div><label id="l-rel" for="d_relation_to_deceased">Applicant is</label><select id="d_relation_to_deceased"></select></div>
        <div><label id="l-appsex" for="d_applicant_sex">Applicant sex</label><select id="d_applicant_sex"></select></div>
      </div>
      <div class="check"><input type="checkbox" id="d_bpl"><label for="d_bpl" id="l-dbpl" style="margin:0">BPL household</label></div>
      <div class="check"><input type="checkbox" id="d_was_breadwinner" checked><label for="d_was_breadwinner" id="l-bread" style="margin:0">Was the primary breadwinner</label></div>
      <div class="check"><input type="checkbox" id="d_accidental_death"><label for="d_accidental_death" id="l-acc" style="margin:0">Accidental death</label></div>
      <div class="check"><input type="checkbox" id="d_deceased_had_bank_account" checked><label for="d_deceased_had_bank_account" id="l-decbank" style="margin:0">Deceased had a bank account</label></div>
      <div class="check"><input type="checkbox" id="d_formal_sector"><label for="d_formal_sector" id="l-formal" style="margin:0">Formal-sector worker (EPF/ESIC)</label></div>
      <div class="check"><input type="checkbox" id="d_construction_worker"><label for="d_construction_worker" id="l-bocw" style="margin:0">Registered construction worker</label></div>
      <div class="check"><input type="checkbox" id="d_has_aadhaar" checked><label for="d_has_aadhaar" id="l-daadhaar" style="margin:0">Applicant has Aadhaar</label></div>
      <div class="check"><input type="checkbox" id="d_has_bank_account" checked><label for="d_has_bank_account" id="l-dbank" style="margin:0">Applicant has a bank account</label></div>
    </div>

    <div id="cbFields">
    <div class="row">
      <div><label id="l-area" for="area">Area</label><select id="area"></select></div>
      <div><label id="l-delivery" for="delivery_type">Delivery</label><select id="delivery_type"></select></div>
    </div>
    <div class="row">
      <div><label id="l-childnum" for="child_number">Child number</label><select id="child_number"><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
      <div><label id="l-childsex" for="child_sex">Child sex</label><select id="child_sex"></select></div>
    </div>
    <div class="row">
      <div><label id="l-age" for="mother_age_years">Mother's age</label><input type="number" id="mother_age_years" value="24" min="13" max="55"></div>
      <div><label id="l-birth" for="birth_date">Birth date</label><input type="date" id="birth_date"></div>
    </div>
    <div class="row">
      <div><label id="l-outcome" for="birth_outcome">Birth outcome</label><select id="birth_outcome"></select></div>
      <div><label id="l-moutcome" for="maternal_outcome">Mother</label><select id="maternal_outcome"></select></div>
    </div>

    <details>
      <summary id="t-more">More details (category, income, risk…)</summary>
      <div class="row">
        <div><label id="l-cat" for="category">Social category</label><select id="category"></select></div>
        <div><label id="l-dstate" for="delivery_state">Delivered in (if migrant)</label><select id="delivery_state"></select></div>
      </div>
      <div class="check"><input type="checkbox" id="bpl"><label for="bpl" id="l-bpl" style="margin:0">BPL household</label></div>
      <div class="check"><input type="checkbox" id="premature"><label for="premature" id="l-prem" style="margin:0">Premature</label></div>
      <div class="check"><input type="checkbox" id="low_birth_weight"><label for="low_birth_weight" id="l-lbw" style="margin:0">Low birth weight</label></div>
      <div class="check"><input type="checkbox" id="single_mother"><label for="single_mother" id="l-single" style="margin:0">Single / widowed mother</label></div>
      <div class="check"><input type="checkbox" id="mother_disability"><label for="mother_disability" id="l-mdis" style="margin:0">Mother has a disability</label></div>
      <div class="check"><input type="checkbox" id="child_disability"><label for="child_disability" id="l-cdis" style="margin:0">Child has a disability</label></div>
      <div class="check"><input type="checkbox" id="govt_employee"><label for="govt_employee" id="l-govt" style="margin:0">Regular govt / PSU employee</label></div>
      <div class="check"><input type="checkbox" id="has_aadhaar" checked><label for="has_aadhaar" id="l-aadhaar" style="margin:0">Has Aadhaar</label></div>
      <div class="check"><input type="checkbox" id="has_bank_account" checked><label for="has_bank_account" id="l-bank" style="margin:0">Has Aadhaar-linked bank account</label></div>
    </details>
    </div><!-- /cbFields -->

    <button type="button" class="btn" id="saveBtn">Save to caseload</button>
  </form>

  <!-- RESULTS -->
  <div class="panel">
    <div class="tabs" role="tablist">
      <button id="tabToday" role="tab" aria-selected="false">Today</button>
      <button id="tabMother" role="tab" aria-selected="true" class="on">This mother</button>
    </div>
    <div id="results" aria-live="polite" aria-busy="true"><p class="profile-line">Loading…</p></div>
  </div>
</div>
<footer id="kbnote"></footer>

<script>
const FIELDS = ["state","delivery_state","area","delivery_type","child_number","child_sex",
  "mother_age_years","birth_date","birth_outcome","maternal_outcome","category"];
const BOOLS = ["bpl","premature","low_birth_weight","single_mother","mother_disability",
  "child_disability","govt_employee","has_aadhaar","has_bank_account"];
// Death-event fields: element id = "d_" + field name; "state" is shared.
const DFIELDS = ["death_date","area","relation_to_deceased","applicant_sex",
  "deceased_age_years","applicant_age_years"];
const DBOOLS = ["bpl","was_breadwinner","accidental_death","deceased_had_bank_account",
  "formal_sector","construction_worker","has_aadhaar","has_bank_account"];

const OPT_LABELS = {
  delivery_type:{institutional_public:"Public facility",institutional_private_empanelled:"Private (empanelled)",institutional_private:"Private (other)",home:"At home"},
  child_sex:{girl:"Girl",boy:"Boy"},
  category:{general:"General",obc:"OBC",sc:"SC",st:"ST"},
  birth_outcome:{live:"Live birth",stillbirth:"Stillbirth",neonatal_death:"Newborn died"},
  maternal_outcome:{alive:"Mother alive",deceased:"Mother died"},
  area:{rural:"Rural",urban:"Urban"},
  relation_to_deceased:{spouse:"Spouse",child:"Child",parent:"Parent",sibling:"Sibling",other:"Other"},
  applicant_sex:{female:"Female",male:"Male"},
};
const I18N = {

    childnum:"Child number",childsex:"Child sex",age:"Mother's age",birth:"Birth date",outcome:"Birth outcome",moutcome:"Mother",
    more:"More details (category, income, risk…)",cat:"Social category",dstate:"Delivered in (if migrant)",bpl:"BPL household",
    prem:"Premature",lbw:"Low birth weight",single:"Single / widowed mother",mdis:"Mother has a disability",cdis:"Child has a disability",
    govt:"Regular govt / PSU employee",aadhaar:"Has Aadhaar",bank:"Has Aadhaar-linked bank account",save:"Save to caseload",
    newm:"+ New mother",lang:"हिन्दी",remaining:"remaining cash for this mother",outstanding:"actions still to do",
    docsH:"Documents to gather",notElig:"Not eligible here",nextAction:"Next action",done:"done",
    today:"Today",thisMother:"This mother",visitToday:"visit today",nextVisit:"next visit day",
    hbncDone:"HBNC complete",appliedBtn:"Applied today",receivedBtn:"Received ✓",appliedTag:"applied",
    stuckTag:"stuck",applyAt:"Apply at",grievanceL:"Escalate to",complaint:"Copy complaint",
    backup:"Backup",restore:"Restore",csv:"Report CSV",
    planEmpty:"No mothers in the caseload yet — fill the form and Save.",
    allCaught:"All caught up — no visits or urgent items today.",toApply:"to claim",
    event:"Life event",eventCb:"Childbirth",eventDeath:"Death in family",demo:"Load demo caseload",
    voice:"Speak",understood:"Understood",noVoice:"Voice input needs Chrome on Android/desktop.",
    ddate:"Date of death",darea:"Area",decage:"Deceased's age",appage:"Applicant's age",
    rel:"Applicant is",appsex:"Applicant sex",dbpl:"BPL household",bread:"Was the primary breadwinner",
    acc:"Accidental death",decbank:"Deceased had a bank account",formal:"Formal-sector worker (EPF/ESIC)",

    followup:"Follow-up · day",case:"This case"},
  hi:{title:"सहज · Sahej",tag:"आशा कार्यकर्ता की सहायक — हर नई माँ का हक़, उन्हीं दिनों पर जब आप पहले से जाती हैं।",
    caseload:"मेरी सूची",mother:"यह माँ",name:"नाम / पहचान",state:"राज्य / केंद्रशासित",area:"क्षेत्र",delivery:"प्रसव",
    childnum:"संतान क्रमांक",childsex:"शिशु लिंग",age:"माँ की उम्र",birth:"जन्म तिथि",outcome:"जन्म परिणाम",moutcome:"माँ",

let META=null, lang="en";
let current = newMother();
let caseload = load();

function localISO(d){return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);}
function today(){return localISO(new Date());}
function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return localISO(d);}
function newMother(event){
  event=event||"childbirth";
  if(event==="death")return {id:null,name:"",event:"death",
    profile:{state:"BR",area:"rural",death_date:today(),relation_to_deceased:"spouse",applicant_sex:"female",
      deceased_age_years:45,applicant_age_years:40},
    bools:{was_breadwinner:true,deceased_had_bank_account:true,has_aadhaar:true,has_bank_account:true},
    claimed:[],applied:{}};
  return {id:null,name:"",event:"childbirth",profile:{state:"BR",area:"rural",delivery_type:"institutional_public",
    child_number:1,child_sex:"girl",mother_age_years:24,birth_date:today(),birth_outcome:"live",maternal_outcome:"alive",
    category:"general",delivery_state:""},bools:{has_aadhaar:true,has_bank_account:true},claimed:[],applied:{}};
}
function migrate(m){if(!m.applied)m.applied={};if(!m.claimed)m.claimed=[];if(!m.event)m.event="childbirth";return m;}
function fieldSets(ev){return ev==="death"?{f:DFIELDS,b:DBOOLS,prefix:"d_"}:{f:FIELDS,b:BOOLS,prefix:""};}
function load(){try{return JSON.parse(localStorage.getItem("sahej_caseload")||"[]")}catch(e){return[]}}
function persist(){try{localStorage.setItem("sahej_caseload",JSON.stringify(caseload));}catch(e){/* storage full/blocked — keep working in memory */}}
function rupees(n){return "₹"+Number(n).toLocaleString("en-IN");}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function L(k){return (I18N[lang]||I18N.en)[k];}
function optLabel(field,val){return (OPT_LABELS[field]&&OPT_LABELS[field][val])||val;}

function fillSelect(el,values,field){el.innerHTML=values.map(v=>`<option value="${v}">${optLabel(field,v)}</option>`).join("");}

async function init(){
  lang=localStorage.getItem("sahej_lang")==="hi"?"hi":"en";
  META = await (await fetch("/api/meta")).json();
  const states = META.states;
  const stateOpts = states.map(s=>`<option value="${s.code}">${s.name}${s.lps?" (LPS)":""}</option>`).join("");
  document.getElementById("state").innerHTML = stateOpts;
  document.getElementById("delivery_state").innerHTML = `<option value="">— same as home —</option>`+stateOpts;
  fillSelect(document.getElementById("area"),META.options.area,"area");
  fillSelect(document.getElementById("delivery_type"),META.options.delivery_type,"delivery_type");
  fillSelect(document.getElementById("child_sex"),META.options.child_sex,"child_sex");
  fillSelect(document.getElementById("birth_outcome"),META.options.birth_outcome,"birth_outcome");
  fillSelect(document.getElementById("maternal_outcome"),META.options.maternal_outcome,"maternal_outcome");
  fillSelect(document.getElementById("category"),META.options.category,"category");
  const dOpts=(META.events&&META.events.death&&META.events.death.options)||{};
  fillSelect(document.getElementById("d_area"),dOpts.area||["rural","urban"],"area");
  fillSelect(document.getElementById("d_relation_to_deceased"),dOpts.relation_to_deceased||["spouse","child","parent","sibling","other"],"relation_to_deceased");
  fillSelect(document.getElementById("d_applicant_sex"),dOpts.applicant_sex||["female","male"],"applicant_sex");
  document.getElementById("d_death_date").value=today();
  setupVoice();
  caseload=caseload.map(migrate);
  applyLang(); loadIntoForm(); renderCaseload();
  setView(caseload.length?"today":"mother");
}

function applyLang(){
  document.getElementById("t-title").textContent=L("title");
  document.getElementById("t-tag").textContent=L("tag");
  document.getElementById("langBtn").textContent=L("lang");

    "l-mdis":"mdis","l-cdis":"cdis","l-govt":"govt","l-aadhaar":"aadhaar","l-bank":"bank",
    "l-event":"event","t-voice":"voice","l-ddate":"ddate","l-darea":"darea","l-decage":"decage","l-appage":"appage",
    "l-rel":"rel","l-appsex":"appsex","l-dbpl":"dbpl","l-bread":"bread","l-acc":"acc","l-decbank":"decbank",

function syncEventUI(){
  const ev=current.event||"childbirth";
  document.getElementById("life_event").value=ev;
  document.getElementById("cbFields").hidden=(ev==="death");
  document.getElementById("deathFields").hidden=(ev!=="death");
}
function loadIntoForm(){
  const p=current.profile, b=current.bools, fs=fieldSets(current.event);
  syncEventUI();
  document.getElementById("name").value=current.name||"";
  document.getElementById("state").value=p.state||"BR";
  fs.f.forEach(f=>{const el=document.getElementById(fs.prefix+f);if(el&&p[f]!==undefined)el.value=p[f];});
  fs.b.forEach(f=>{const el=document.getElementById(fs.prefix+f);if(el)el.checked=!!b[f];});
}
function formToCurrent(){
  const fs=fieldSets(current.event);
  current.name=document.getElementById("name").value;
  current.profile.state=document.getElementById("state").value;
  fs.f.forEach(f=>{const el=document.getElementById(fs.prefix+f);if(el)current.profile[f]=el.value;});
  current.bools={}; fs.b.forEach(f=>{const el=document.getElementById(fs.prefix+f);if(el)current.bools[f]=el.checked;});
}

function buildQuery(){
  const q=new URLSearchParams();
  q.set("life_event",current.event||"childbirth");
  for(const k in current.profile){if(current.profile[k]!=="")q.set(k,current.profile[k]);}
  for(const k in current.bools){q.set(k,current.bools[k]?"true":"false");}
  if(current.claimed.length)q.set("claimed",current.claimed.join(","));
  const ap=Object.entries(current.applied||{}).map(([c,d])=>c+":"+d).join(",");
  if(ap)q.set("applied",ap);
  return q.toString();
}
function persistCurrent(){
  if(!current.id)return;
  const i=caseload.findIndex(x=>x.id===current.id);
  if(i>=0){caseload[i]=JSON.parse(JSON.stringify(current));persist();}
}

let view="mother";
function setView(v){
  view=v;
  for(const [id,on] of [["tabToday",v==="today"],["tabMother",v==="mother"]]){
    const el=document.getElementById(id);el.classList.toggle("on",on);el.setAttribute("aria-selected",on);
  }
  refresh();
}
function refresh(){view==="today"?runToday():run();}

async function run(){
  const box=document.getElementById("results");
  box.setAttribute("aria-busy","true");
  try{
    const res=await fetch("/api/resolve?"+buildQuery());
    const r=await res.json();
    if(!res.ok){box.innerHTML='<p class="profile-line">Could not compute: '+esc(r.error||"invalid input")+'</p>';return;}
    window._last=r; render(r);
  }catch(e){
    box.innerHTML='<p class="profile-line">Can\'t reach the engine and no saved copy of this plan yet. '
      +'Check the connection and <button class="btn sec" style="width:auto;margin-top:8px;padding:7px 14px" onclick="run()">try again</button></p>';
  }finally{box.setAttribute("aria-busy","false");}
}

function flatten(m){
  const p={...m.profile};
  for(const k in (m.bools||{}))p[k]=m.bools[k];
  p.claimed=m.claimed||[]; p.applied=m.applied||{};
  p.life_event=m.event||"childbirth";
  for(const k in p)if(p[k]==="")delete p[k];
  return p;
}

async function runToday(){
  const box=document.getElementById("results");
  box.setAttribute("aria-busy","true");
  if(!caseload.length){box.innerHTML='<p class="profile-line">'+L("planEmpty")+'</p>';box.setAttribute("aria-busy","false");return;}
  try{
    const mothers=caseload.map(m=>({id:m.id,name:m.name,profile:flatten(m)}));
    const res=await fetch("/api/plan",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mothers})});
    const pl=await res.json();
    if(!res.ok){box.innerHTML='<p class="profile-line">'+esc(pl.error||"error")+'</p>';return;}
    window._plan=pl; renderPlan(pl);
  }catch(e){
    box.innerHTML='<p class="profile-line">Can\'t reach the engine. <button class="abtn" onclick="runToday()">Retry</button></p>';
  }finally{box.setAttribute("aria-busy","false");}
}

function renderPlan(pl){
  const t=pl.totals;
  let h='<div class="summary">'
    +'<div class="stat"><div class="big">'+t.visits_today+'</div><div class="lbl">'+L("visitToday")+'</div></div>'
    +'<div class="stat"><div class="big">'+(t.overdue+t.stuck)+'</div><div class="lbl">overdue + '+L("stuckTag")+'</div></div>'
    +'<div class="stat"><div class="big">'+rupees(t.remaining_cash_inr)+'</div><div class="lbl">'+L("toApply")+'</div></div></div>';
  if(pl.plan.length&&!pl.plan.some(e=>e.score>=20||e.overdue||e.stuck||e.urgent))
    h+='<div class="alert a-warn">'+L("allCaught")+'</div>';
  pl.plan.forEach(e=>{
    const chips=[];
    if(e.event==="death")chips.push('<span class="chip2 c-stuck" style="background:var(--purple-soft);color:var(--purple)">'+L("eventDeath")+'</span>');
    if(e.visit_today)chips.push('<span class="chip2 c-visit">'+L("visitToday")+'</span>');
    if(e.overdue)chips.push('<span class="chip2 c-over">'+e.overdue+' overdue</span>');
    if(e.stuck)chips.push('<span class="chip2 c-stuck">'+e.stuck+' '+L("stuckTag")+'</span>');
    if(e.urgent)chips.push('<span class="chip2 c-urg">'+e.urgent+' urgent</span>');
    if(e.remaining_cash_inr)chips.push('<span class="chip2 c-cash">'+rupees(e.remaining_cash_inr)+'</span>');
    const when=e.hbnc_complete?L("hbncDone"):(e.visit_today?"":L("nextVisit")+" "+e.next_visit_day);
    const acts=e.top_actions.map(a=>'<li>'+esc(a.title)+(a.cash_inr?' ('+rupees(a.cash_inr)+')':'')+'</li>').join("");
    h+='<div class="prow" data-mid="'+esc(e.id)+'" role="button" tabindex="0">'
      +'<div class="top"><span class="nm">'+esc(e.name)+'</span><span class="day">day '+e.day+(when?' · '+when:'')+'</span></div>'
      +'<div class="chips">'+chips.join("")+'</div>'+(acts?'<ul>'+acts+'</ul>':'')+'</div>';
  });
  pl.errors.forEach(er=>{h+='<div class="alert a-blocker">'+esc(er.name)+': '+esc(er.error)+'</div>';});
  const box=document.getElementById("results");
  box.innerHTML=h;
  box.querySelectorAll(".prow").forEach(rw=>{
    const open=()=>{selectMother(rw.dataset.mid);};
    rw.addEventListener("click",open);
    rw.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();open();}});
  });
}
function setOffline(off){document.getElementById("offlineBanner").classList.toggle("on",!!off);}
window.addEventListener("online",()=>{setOffline(false);run();});
window.addEventListener("offline",()=>setOffline(true));
if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{});}

function badge(it){
  let b=[];
  if(it.done)b.push('<span class="badge b-done">'+L("done")+'</span>');
  else if(it.status==="applied"){
    b.push('<span class="badge b-applied">'+L("appliedTag")+' '+it.days_since_applied+'d</span>');
    if(it.stuck)b.push('<span class="badge b-stuck">'+L("stuckTag")+'</span>');
  }
  else if(it.status==="overdue")b.push('<span class="badge b-overdue">overdue</span>');
  else if(it.status==="urgent")b.push('<span class="badge b-urgent">urgent</span>');
  else if(it.status==="blocked")b.push('<span class="badge b-blocked">blocked</span>');
  if(it.is_gateway)b.push('<span class="badge b-gate">gateway</span>');
  if(it.needs_verification)b.push('<span class="badge b-verify">verify</span>');
  if(it.deadline_day!=null&&!it.done&&it.status!=="applied")b.push('<span class="badge b-deadline">due day '+it.deadline_day+'</span>');
  return b.join("");
}
function cardHTML(it){
  const title = (lang==="hi"&&it.title_hi)?it.title_hi:it.title;
  const sub = (lang==="hi"&&it.title_hi)?it.title:(it.title_hi||"");
  const cash=it.cash_inr?'<div class="cash">'+rupees(it.cash_inr)+'</div>':'';
  const blk=it.blocked_by.length?'<div class="meta2">Do first: <b>'+esc(it.blocked_by.join(", "))+'</b></div>':'';
  const docs=it.documents.length?'<div class="meta2">Docs: '+esc(it.documents.join(", "))+'</div>':'';
  const note=it.note?'<div class="meta2">'+esc(it.note)+'</div>':'';
  const where=(it.apply_at&&!it.done)?'<div class="meta2">'+L("applyAt")+': <b>'+esc(it.apply_at)+'</b>'
    +(it.apply_via?' · '+esc(it.apply_via):'')+'</div>':'';
  const grv=((it.stuck||it.status==="overdue")&&it.grievance)
    ?'<div class="meta2">'+L("grievanceL")+': <b>'+esc(it.grievance)+'</b></div>':'';
  let btns='';
  if(!it.done&&it.status!=="blocked"){
    if(it.status==="applied"){
      btns='<div class="abtns"><button type="button" class="abtn" data-recv="'+it.component_id+'">'+L("receivedBtn")+'</button>'
        +(it.stuck?'<button type="button" class="abtn warn" data-complain="'+it.component_id+'">'+L("complaint")+'</button>':'')+'</div>';
    }else{
      btns='<div class="abtns"><button type="button" class="abtn" data-app="'+it.component_id+'">'+L("appliedBtn")+'</button></div>';
    }
  }
  return '<div class="card '+(it.done?'done':'')+'">'
    +'<input class="cb" type="checkbox" data-cid="'+it.component_id+'" '+(it.done?'checked':'')
    +' aria-label="'+esc(it.title)+' '+L("done")+'">'
    +'<div class="body"><div class="top"><div><div class="title">'+badge(it)+title+'</div>'
    +(sub?'<div class="hi">'+sub+'</div>':'')
    +'<div class="scheme">'+it.scheme_name+'</div></div>'+cash+'</div>'+blk+where+grv+docs+note+btns+'</div></div>';
}

function render(r){
  const sens=r.summary.sensitive_mode;
  document.getElementById("hdr").className=sens?"sensitive":"";
  let h='<div class="summary">'
    +'<div class="stat"><div class="big">'+rupees(r.summary.remaining_cash_inr)+'</div><div class="lbl">'+L("remaining")+'</div></div>'
    +'<div class="stat"><div class="big">'+r.summary.outstanding_count+'</div><div class="lbl">'+L("outstanding")+'</div></div></div>';
  const p=r.profile;
  if(r.life_event==="death"){
    h+='<div class="profile-line">'+(current.name?'<b>'+esc(current.name)+'</b> · ':'')+esc(p.state_name)
      +' · '+optLabel("area",p.area)+' · '+L("eventDeath")+' · '+optLabel("relation_to_deceased",p.relation_to_deceased)
      +' · '+esc(p.death_date||'')+' (day '+p.days_since_birth+')</div>';
  }else{
    h+='<div class="profile-line">'+(current.name?'<b>'+esc(current.name)+'</b> · ':'')+esc(p.state_name)+(p.state_lps?' (LPS)':' (HPS)')
      +' · '+optLabel("area",p.area)+' · '+optLabel("delivery_type",p.delivery_type)+' · '+optLabel("birth_outcome",p.birth_outcome)
      +' · born '+p.birth_date+' (day '+p.days_since_birth+')</div>';
  }

  r.alerts.forEach(a=>{h+='<div class="alert a-'+a.level+'">'+a.text+'</div>';});
  if(r.next_action){const n=r.next_action;h+='<div class="alert a-warn"><b>'+L("nextAction")+':</b> '+n.title
    +(n.days_remaining!=null?' — '+(n.days_remaining<0?Math.abs(n.days_remaining)+' days overdue':'in '+n.days_remaining+' days'):'')+'</div>';}

  const order=[0,...r.visit_days,"ongoing"];
  const vlabel=r.life_event==="death"
    ?(k=>k===0?"First contact":k==="ongoing"?"Ongoing — no hard date":L("followup")+" "+k)
    :(k=>k===0?"At delivery / first contact":k==="ongoing"?"Ongoing — confirm it was claimed":"ASHA home visit · day "+k);
  order.forEach(k=>{const items=r.by_asha_visit[k];if(items&&items.length){
    h+='<div class="visit"><div class="dot"></div><h3>'+vlabel(k)+'</h3>'+items.map(cardHTML).join("")+'</div>';}});

  if(r.documents.length){h+='<h2 style="margin-top:14px">'+L("docsH")+'</h2><ul class="docs">'
    +r.documents.map(d=>'<li>'+d.document+' <small>('+d.needed_for.join(", ")+')</small></li>').join("")+'</ul>';}
  if(r.not_eligible.length){h+='<div class="none"><b>'+L("notElig")+':</b> '
    +r.not_eligible.map(n=>n.name+' — '+n.reason).join(' · ')+'</div>';}
  document.getElementById("results").innerHTML=h;

  document.querySelectorAll(".cb").forEach(cb=>cb.addEventListener("change",e=>toggleClaim(e.target.dataset.cid,e.target.checked)));
  document.querySelectorAll("[data-app]").forEach(b=>b.addEventListener("click",()=>markApplied(b.dataset.app)));
  document.querySelectorAll("[data-recv]").forEach(b=>b.addEventListener("click",()=>markReceived(b.dataset.recv)));
  document.querySelectorAll("[data-complain]").forEach(b=>b.addEventListener("click",()=>copyComplaint(b.dataset.complain)));
  document.getElementById("kbnote").textContent="Knowledge base v"+r.kb_version+" ("+r.kb_as_of+"). "
    +"Demo data — rules marked “verify” must be confirmed against current government orders. Not medical or legal advice.";
}

function toggleClaim(cid,on){
  current.claimed=current.claimed.filter(x=>x!==cid);
  if(on)current.claimed.push(cid);
  persistCurrent();
  run();
}
function markApplied(cid){
  current.applied=current.applied||{};
  current.applied[cid]=today();
  persistCurrent();
  run();
}
function markReceived(cid){
  if(current.applied)delete current.applied[cid];
  toggleClaim(cid,true);
}
function complaintText(cid){
  const r=window._last;
  const it=r&&r.timeline.find(x=>x.component_id===cid);
  if(!it)return"";
  return "COMPLAINT — "+it.scheme_name
    +"\nBenefit: "+it.title+(it.cash_inr?" ("+rupees(it.cash_inr)+")":"")
    +"\nBeneficiary: "+(current.name||"(mother)")+", "+(r.profile.state_name||"")
    +"\nApplied on "+it.applied_date+" — "+it.days_since_applied+" days ago; benefit still not received."
    +"\nEscalation: "+(it.grievance||"block office")
    +"\nRequesting urgent action as per scheme guidelines. (Generated by Sahej)";
}
function copyComplaint(cid){
  const t=complaintText(cid);
  if(!t)return;
  (navigator.clipboard?navigator.clipboard.writeText(t):Promise.reject())
    .then(()=>alert("Complaint copied — paste into WhatsApp / CPGRAMS."))
    .catch(()=>prompt("Copy this complaint:",t));
}

function renderCaseload(){
  const el=document.getElementById("caseList");
  if(!caseload.length){
    el.innerHTML='<div class="empty">No mothers saved yet. Fill the form and Save.</div>'
      +'<button class="btn sec" id="demoBtn" style="margin-top:4px">'+L("demo")+'</button>';
    const db=document.getElementById("demoBtn");
    if(db)db.addEventListener("click",loadDemo);
    return;
  }
  el.innerHTML=caseload.map(m=>{
    const done=(m.claimed||[]).length;
    const tag=(m.event==="death"?L("eventDeath"):esc(m.profile.state||""));
    return '<div class="case '+(m.id===current.id?'active':'')+'" data-id="'+esc(m.id)+'" role="button" tabindex="0">'
      +'<div>'+esc(m.name||"(unnamed)")+'<small>'+tag+' · '+done+' done</small></div>'
      +'<button class="del" data-del="'+esc(m.id)+'" aria-label="Remove '+esc(m.name||"this mother")+' from caseload">✕</button></div>';}).join("");
  el.querySelectorAll(".case").forEach(c=>{
    c.addEventListener("click",e=>{if(e.target.dataset.del)return; selectMother(c.dataset.id);});
    c.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();selectMother(c.dataset.id);}});
  });
  el.querySelectorAll(".del").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();delMother(b.dataset.del);}));
}
function selectMother(id){const m=caseload.find(x=>x.id===id);if(!m)return;current=migrate(JSON.parse(JSON.stringify(m)));loadIntoForm();renderCaseload();setView("mother");}
function delMother(id){
  const m=caseload.find(x=>x.id===id);
  if(!confirm("Remove "+((m&&m.name)||"this mother")+" from the caseload? This cannot be undone."))return;
  caseload=caseload.filter(x=>x.id!==id);persist();
  if(current.id===id){current=newMother();loadIntoForm();}
  renderCaseload();run();}
function saveMother(){
  formToCurrent();
  if(!current.id)current.id="m"+Date.now();
  const i=caseload.findIndex(x=>x.id===current.id);
  const snap=JSON.parse(JSON.stringify(current));
  if(i>=0)caseload[i]=snap;else caseload.push(snap);
  persist();renderCaseload();
}

function shareText(){
  const r=window._last;if(!r)return"";
  let lines=["*Sahej — "+(current.name||"mother")+"*",
    "Remaining: "+rupees(r.summary.remaining_cash_inr)+" · "+r.summary.outstanding_count+" actions"];
  r.timeline.filter(it=>!it.done).forEach(it=>{
    lines.push("• "+it.title+(it.cash_inr?" ("+rupees(it.cash_inr)+")":"")
      +(it.deadline_day!=null?" — by day "+it.deadline_day:""));});
  if(r.documents.length)lines.push("\nDocuments: "+r.documents.map(d=>d.document).join(", "));
  return lines.join("\n");
}

// ---- voice intake (Web Speech API; hi-IN / en-IN) ----
const HI_STATES={AP:"आंध्र",AR:"अरुणाचल",AS:"असम",BR:"बिहार",CG:"छत्तीसगढ़",GA:"गोवा",GJ:"गुजरात",
  HR:"हरियाणा",HP:"हिमाचल",JH:"झारखंड",KA:"कर्नाटक",KL:"केरल",MP:"मध्य प्रदेश",MH:"महाराष्ट्र",
  MN:"मणिपुर",ML:"मेघालय",MZ:"मिज़ोरम",NL:"नागालैंड",OR:"ओडिशा",PB:"पंजाब",RJ:"राजस्थान",SK:"सिक्किम",
  TN:"तमिलनाडु",TG:"तेलंगाना",TR:"त्रिपुरा",UP:"उत्तर प्रदेश",UK:"उत्तराखंड",WB:"बंगाल",
  AN:"अंडमान",CH:"चंडीगढ़",DH:"दादरा",DL:"दिल्ली",JK:"जम्मू",LA:"लद्दाख",LD:"लक्षद्वीप",PY:"पुडुचेरी"};
const HI_NUM={"एक":1,"दो":2,"तीन":3,"चार":4,"पांच":5,"पाँच":5,"छह":6,"सात":7,"आठ":8,"नौ":9,"दस":10,
  one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10};
function num(w){if(/^\d+$/.test(w))return parseInt(w,10);return HI_NUM[w]!==undefined?HI_NUM[w]:null;}

function parseUtterance(t){
  t=" "+t.toLowerCase().trim()+" ";
  const out={}, got=[];
  // state (english name or hindi alias)
  for(const s of (META?META.states:[])){
    if(t.includes(s.name.toLowerCase())||(HI_STATES[s.code]&&t.includes(HI_STATES[s.code].toLowerCase()))){
      out.state=s.code;got.push(s.name);break;}
  }
  // child number
  if(/पहल|first/.test(t)){out.child_number=1;got.push("child #1");}
  else if(/दूसर|second/.test(t)){out.child_number=2;got.push("child #2");}
  else if(/तीसर|third/.test(t)){out.child_number=3;got.push("child #3");}
  // sex
  if(/लड़की|लडकी|बेटी|girl|daughter/.test(t)){out.child_sex="girl";got.push("girl");}
  else if(/लड़का|लडका|बेटा|boy|son/.test(t)){out.child_sex="boy";got.push("boy");}
  // delivery place
  if(/घर पर|घर में|at home|home delivery/.test(t)){out.delivery_type="home";got.push("home delivery");}
  else if(/प्राइवेट|निजी|private/.test(t)){out.delivery_type="institutional_private";got.push("private hospital");}
  else if(/अस्पताल|सरकारी|hospital|phc|health cent/.test(t)){out.delivery_type="institutional_public";got.push("public facility");}
  // when
  let m=t.match(/(\d+|[^\s]+)\s*(?:दिन पहले|days? ago)/);
  if(m){const n=num(m[1]);if(n!=null){out.birth_date=daysAgo(n);got.push(n+" days ago");}}
  else if(/परसों/.test(t)){out.birth_date=daysAgo(2);got.push("2 days ago");}
  else if(/कल|yesterday/.test(t)){out.birth_date=daysAgo(1);got.push("yesterday");}
  else if(/आज|today/.test(t)){out.birth_date=today();got.push("today");}
  // age
  m=t.match(/(?:उम्र|age)\s*(\d+)/)||t.match(/(\d+)\s*(?:साल|वर्ष|years?)/);
  if(m){out.mother_age_years=parseInt(m[1],10);got.push("age "+m[1]);}
  // area
  if(/शहर|urban|city/.test(t)){out.area="urban";got.push("urban");}
  else if(/गांव|गाँव|देहात|village|rural/.test(t)){out.area="rural";got.push("rural");}
  // flags
  if(/जुड़वा|जुडवा|twin/.test(t)){out.multiple_birth=2;got.push("twins");}
  if(/बीपीएल|bpl/.test(t)){out._bpl=true;got.push("BPL");}
  return {fields:out,understood:got};
}

function setupVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const btn=document.getElementById("micBtn");
  if(!SR){btn.hidden=true;return;}
  btn.hidden=false;
  btn.addEventListener("click",()=>{
    const rec=new SR();
    rec.lang=lang==="hi"?"hi-IN":"en-IN";
    rec.interimResults=false;rec.maxAlternatives=1;
    const out=document.getElementById("voiceOut");
    out.hidden=false;out.textContent="🎤 …";
    rec.onresult=(ev)=>{
      const text=ev.results[0][0].transcript;
      const res=parseUtterance(text);
      if(current.event!=="childbirth"){current=newMother("childbirth");}
      Object.assign(current.profile,res.fields);
      delete current.profile._bpl;
      if(res.fields._bpl)current.bools.bpl=true;
      loadIntoForm();persistCurrent();
      out.innerHTML='“'+esc(text)+'”<br><b>'+L("understood")+':</b> '+(res.understood.length?esc(res.understood.join(" · ")):"—");
      if(view!=="mother")setView("mother");else run();
    };
    rec.onerror=()=>{out.textContent=L("noVoice");};
    rec.start();
  });
}

// events
document.getElementById("life_event").addEventListener("change",e=>{
  const ev=e.target.value;
  if(ev===(current.event||"childbirth"))return;
  const keep={name:current.name,state:current.profile.state};
  current=newMother(ev);
  current.name=keep.name;current.profile.state=keep.state||current.profile.state;
  loadIntoForm();
  if(view!=="mother")setView("mother");else run();
});
document.getElementById("form").addEventListener("input",()=>{formToCurrent();persistCurrent();if(view!=="mother")setView("mother");else run();});

document.getElementById("tabMother").addEventListener("click",()=>setView("mother"));

// data tools
function download(name,text,type){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([text],{type}));
  a.download=name;a.click();URL.revokeObjectURL(a.href);
}
document.getElementById("backupBtn").addEventListener("click",()=>{
  download("sahej-caseload-"+today()+".json",JSON.stringify(caseload,null,2),"application/json");});
document.getElementById("restoreBtn").addEventListener("click",()=>document.getElementById("restoreFile").click());
document.getElementById("restoreFile").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const data=JSON.parse(rd.result);
      if(!Array.isArray(data))throw new Error("not a caseload file");
      if(!confirm("Replace the current caseload ("+caseload.length+" mothers) with "+data.length+" from this backup?"))return;
      caseload=data.map(migrate);persist();
      current=newMother();loadIntoForm();renderCaseload();setView(caseload.length?"today":"mother");
    }catch(err){alert("Could not read backup: "+err.message);}
    finally{e.target.value="";}
  };
  rd.readAsText(f);
});
document.getElementById("csvBtn").addEventListener("click",async()=>{
  if(!caseload.length){alert(L("planEmpty"));return;}
  try{
    const mothers=caseload.map(m=>({id:m.id,name:m.name,profile:flatten(m)}));
    const res=await fetch("/api/plan",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mothers})});
    const pl=await res.json();
    if(!res.ok)throw new Error(pl.error||"error");
    const rows=[["name","state","birth_date","day","visit_today","overdue","urgent","stuck","applied","outstanding","remaining_cash_inr"]];
    pl.plan.forEach(en=>{
      const m=caseload.find(x=>x.id===en.id)||{profile:{}};
      rows.push([en.name,m.profile.state||"",m.profile.birth_date||"",en.day,en.visit_today,
        en.overdue,en.urgent,en.stuck,en.applied,en.outstanding,en.remaining_cash_inr]);});
    download("sahej-report-"+today()+".csv",
      rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(",")).join("\n"),"text/csv");
  }catch(err){alert("Report failed: "+err.message);}
});
document.getElementById("printBtn").addEventListener("click",()=>window.print());
document.getElementById("shareBtn").addEventListener("click",()=>{
  const t=shareText();
  if(navigator.share){navigator.share({text:t}).catch(()=>{});}
  else{navigator.clipboard.writeText(t).then(()=>alert("Summary copied — paste into WhatsApp."));}
});

init();
