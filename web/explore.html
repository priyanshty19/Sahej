<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sahej — every government scheme you're owed</title>
<meta name="description" content="Find every central and state government scheme you qualify for — filter by state, caste, gender, age, income, occupation. With deadlines, documents and where to apply.">
<meta name="theme-color" content="#0f7b6c">
<meta property="og:title" content="Sahej — every government scheme you're owed">
<meta property="og:description" content="हर योजना, हर हक़ — filter by who you are, see what you're owed.">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  :root{
    --bg:#f6f4ef; --panel:#fff; --ink:#1d2421; --muted:#6b7670; --line:#e4e0d7;
    --brand:#0f7b6c; --brand-soft:#e2f1ee; --gold:#b9821f; --gold-soft:#f7eed9;
    --danger:#a4453a; --danger-soft:#f5e2df; --info:#2f6dab; --info-soft:#e2ecf6;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5}
  header{background:var(--brand);color:#fff;padding:14px 18px}
  .hrow{max-width:1080px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  header h1{margin:0;font-size:20px}
  header p{margin:2px 0 0;font-size:12.5px;opacity:.92}
  .hbtns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .hbtns a,.hbtns button,.hbtns select{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);
    padding:7px 12px;border-radius:8px;font-size:12.5px;cursor:pointer;text-decoration:none;display:inline-block}
  .hbtns select{padding:7px 8px}
  .hbtns select option{color:#1d2421}
  .hbtns a:hover,.hbtns button:hover,.hbtns select:hover{background:rgba(255,255,255,.28)}
  .hbtns button:disabled{opacity:.5;cursor:not-allowed}
  /* gated scheme detail: blurred until a valid mobile number is entered */
  .gate-blur{filter:blur(7px);pointer-events:none;user-select:none;max-height:60vh;overflow:hidden}
  .gatebox{margin-bottom:14px}
  .gatebox h3{margin:0 0 4px;font-size:17px}
  .gatebox p{margin:0 0 10px;font-size:13px;color:var(--muted)}
  .gaterow{display:flex;gap:8px;flex-wrap:wrap}
  .gaterow input{flex:1;min-width:150px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:#fff}
  .gaterow button{background:var(--brand);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer}
  .gate-err{color:var(--danger);font-size:12.5px;margin-top:6px;min-height:16px}
  .gatebox input[type=text]{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:16px;margin-bottom:8px;background:#fff}
  .gate-dev{margin-top:10px;font-size:12px;color:var(--ink);background:var(--gold-soft);border:1px dashed var(--gold);padding:6px 9px;border-radius:8px}
  .linklike{background:none;border:none;color:var(--brand);cursor:pointer;font-size:12.5px;text-decoration:underline;margin-top:10px;padding:0}
  #consumerChip{background:var(--brand-soft);color:var(--brand);border:1px solid var(--brand);font-weight:600}
  .wrap{max-width:1080px;margin:0 auto;padding:16px}
  /* search + filters */
  .searchbar{display:flex;gap:8px;margin-bottom:10px}
  .searchbar input{flex:1;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:15px;background:#fff}
  .filters{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:6px}
  .filters select,.filters input{width:100%;padding:9px 8px;border:1px solid var(--line);border-radius:9px;
    font-size:13px;background:#fff;color:var(--ink)}
  .filters label{font-size:11px;color:var(--muted);display:block;margin-bottom:2px}
  .ftogl{display:flex;gap:14px;align-items:center;font-size:12.5px;color:var(--muted);margin:6px 0 14px;flex-wrap:wrap}
  .ftogl label{display:flex;gap:5px;align-items:center;cursor:pointer}
  .count{font-size:12.5px;color:var(--muted);margin:2px 0 10px}
  .count b{color:var(--brand);font-size:14px}
  /* cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
  .scard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;
    display:flex;flex-direction:column;gap:6px}
  .scard:hover{border-color:var(--brand);box-shadow:0 2px 10px rgba(15,123,108,.08)}
  .scard .nm{font-weight:700;font-size:14.5px}
  .scard .nmhi{font-size:12.5px;color:var(--muted)}
  .scard .sum{font-size:12.5px;color:var(--ink);opacity:.85;flex:1}
  .scard .amt{font-weight:800;color:var(--brand);font-size:16px}
  .badges{display:flex;gap:5px;flex-wrap:wrap}
  .bdg{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:2px 7px;border-radius:20px}
  .bg-state{background:var(--info-soft);color:var(--info)}
  .bg-central{background:var(--brand-soft);color:var(--brand)}
  .bg-verify{background:var(--danger-soft);color:var(--danger)}
  .bg-new{background:var(--gold-soft);color:var(--gold)}
  .bg-tag{background:#f0ede6;color:var(--muted);text-transform:none;font-weight:600}
  .empty{background:var(--panel);border:1px dashed var(--line);border-radius:14px;padding:30px;text-align:center;color:var(--muted)}
  /* For You */
  .cta-fy{background:var(--gold)!important;border-color:var(--gold)!important;font-weight:700}
  .fybanner{background:linear-gradient(120deg,var(--brand),var(--brand-d,#0b5d52));color:#fff;border-radius:14px;
    padding:16px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .fybanner[hidden]{display:none}
  .fybanner .n{font-size:22px;font-weight:800}
  .fybanner .sub{font-size:13px;opacity:.9}
  .fybanner .acts{display:flex;gap:8px;flex-wrap:wrap}
  .fybanner button{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.4);
    border-radius:9px;padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer}
  .fybanner button:hover{background:rgba(255,255,255,.28)}
  .modal{position:fixed;inset:0;background:rgba(20,28,25,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .modal[hidden]{display:none}
  @media(min-width:640px){.modal{align-items:center}}
  body.modal-open{overflow:hidden}
  .sheet{background:var(--panel);width:100%;max-width:520px;max-height:92vh;overflow:auto;border-radius:18px 18px 0 0;padding:20px}
  @media(min-width:640px){.sheet{border-radius:18px}}
  .sheet h2{margin:0 0 3px;font-size:20px}
  .sheet .lead{color:var(--muted);font-size:13.5px;margin:0 0 14px}
  .sheet label{font-size:12.5px;color:var(--muted);display:block;margin:12px 0 4px;font-weight:600}
  .sheet select,.sheet input[type=number],.sheet input[type=text]{width:100%;padding:11px 10px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff}
  .segrow{display:flex;flex-wrap:wrap;gap:7px}
  .seg{border:1px solid var(--line);background:#fff;border-radius:20px;padding:8px 13px;font-size:13.5px;cursor:pointer}
  .seg.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .sheet .go{width:100%;margin-top:18px;background:var(--brand);color:#fff;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:700;cursor:pointer}
  .sheet .skip{width:100%;margin-top:8px;background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;text-decoration:underline}
  .sheet .x{float:right;background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
  /* detail */
  .detail{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;max-width:760px;margin:0 auto}
  .backbtn{background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:14px;
    font-weight:600;color:var(--brand);cursor:pointer;margin-bottom:12px}
  .detail h2{margin:2px 0 2px;font-size:21px}
  .detail .nmhi{color:var(--muted);font-size:15px;margin-bottom:8px}
  .detail .amt{font-size:26px;font-weight:800;color:var(--brand);margin:8px 0 2px}
  .detail .amtnote{font-size:12.5px;color:var(--muted)}
  .sect{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  .sect h3{margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .sect p,.sect li{font-size:13.5px;margin:4px 0}
  .sect ul{margin:4px 0;padding-left:20px}
  .applybtn{display:inline-block;background:var(--brand);color:#fff;border:none;padding:11px 18px;border-radius:10px;
    font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;margin-top:6px}
  .warnbox{background:var(--danger-soft);border:1px solid var(--danger);color:var(--danger);border-radius:10px;
    padding:9px 12px;font-size:12.5px;margin-top:12px}
  .srcs a{font-size:12px;color:var(--info);word-break:break-all}
  .wabtn{display:inline-block;border:1px solid var(--brand);color:var(--brand);background:#fff;padding:10px 16px;
    border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer;text-decoration:none;margin:6px 6px 0 0}
  footer{max-width:1080px;margin:0 auto;padding:18px;font-size:11px;color:var(--muted)}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:4px}
  @media(max-width:640px){
    .filters{grid-template-columns:1fr 1fr}
    .searchbar input{font-size:16px} /* no iOS zoom */
  }
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div>
      <h1 id="t-title">Sahej · सहज</h1>
      <p id="t-tag">Every government scheme you're owed — by state, caste, age, income, occupation.</p>
    </div>
    <div class="hbtns">
      <button id="fyBtn" class="cta-fy" disabled>✨ <span id="t-fy">Find mine</span></button>
      <select id="langSel" aria-label="Language">
        <option value="en">English</option>
        <option value="hi">हिन्दी</option>
        <option value="bn">বাংলা</option>
        <option value="ta">தமிழ்</option>
        <option value="mr">मराठी</option>
      </select>
      <button id="consumerChip" hidden title="Sign out"></button>
      <a href="/about" id="t-asha">ASHA tool</a>
    </div>
  </div>
</header>

<div class="wrap" id="listView">
  <div class="searchbar">
    <input id="q" type="search" placeholder="Search schemes… (pension, scholarship, घर, किसान)" aria-label="Search schemes">
  </div>
  <div class="filters">
    <div><label id="l-state" for="f_state">State / UT</label><select id="f_state"><option value="">All India</option></select></div>
    <div><label id="l-gender" for="f_gender">Gender</label><select id="f_gender"><option value="">Any</option></select></div>
    <div><label id="l-age" for="f_age">Age</label><input id="f_age" type="number" min="0" max="110" placeholder="—"></div>
    <div><label id="l-cat" for="f_category">Category</label><select id="f_category"><option value="">Any</option></select></div>
    <div><label id="l-occ" for="f_occupation">Occupation</label><select id="f_occupation"><option value="">Any</option></select>
      <input id="f_occupation_other" type="text" placeholder="Please specify" hidden style="margin-top:6px"></div>
    <div><label id="l-income" for="f_income">Annual income (₹)</label><input id="f_income" type="number" min="0" step="1000" placeholder="—"></div>
    <div><label id="l-btype" for="f_benefit_type">Benefit type</label><select id="f_benefit_type"><option value="">Any</option></select></div>
  </div>
  <div class="ftogl">
    <label><input type="checkbox" id="f_bpl"> <span id="l-bpl">BPL / priority household</span></label>
    <label><input type="checkbox" id="f_disability"> <span id="l-dis">Person with disability</span></label>
    <label><input type="checkbox" id="f_rural"> <span id="l-rural">Rural</span></label>
    <button class="bdg bg-tag" id="clearBtn" style="border:none;cursor:pointer;font-size:11.5px">✕ <span id="t-clear">Clear filters</span></button>
  </div>
  <div class="fybanner" id="fyBanner" hidden>
    <div>
      <div class="n" id="fyN"></div>
      <div class="sub" id="fySub"></div>
    </div>
    <div class="acts">
      <button id="fyEdit"></button>
      <button id="fyShare"></button>
      <button id="fyClear"></button>
    </div>
  </div>
  <div class="count" id="count" role="status"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="modal" id="fyModal" hidden>
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="fyTitle">
    <button class="x" id="fyClose" aria-label="Close">×</button>
    <h2 id="fyTitle">Find schemes for you</h2>
    <p class="lead" id="fyLead">A few quick questions — nothing is sent anywhere, it stays on your phone.</p>
    <label id="q-who" for="w_who">Who is this for?</label>
    <div class="segrow" id="seg_who"></div>
    <label id="q-state" for="w_state">State / UT</label>
    <select id="w_state"><option value="">All India</option></select>
    <div class="row" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label id="q-age" for="w_age">Age</label><input id="w_age" type="number" min="0" max="110" placeholder="—"></div>
      <div><label id="q-gender">Gender</label><div class="segrow" id="seg_gender"></div></div>
    </div>
    <label id="q-cat">Social category</label>
    <div class="segrow" id="seg_category"></div>
    <label id="q-occ" for="w_occupation">Main occupation</label>
    <select id="w_occupation"><option value="">Any</option></select>
    <input id="w_occupation_other" type="text" placeholder="Please specify" hidden style="margin-top:8px">
    <label id="q-situation">Anything that applies</label>
    <div class="segrow" id="seg_flags"></div>
    <label id="q-mobile" for="w_mobile">Mobile number</label>
    <input id="w_mobile" type="tel" inputmode="numeric" maxlength="10" placeholder="10-digit mobile">
    <label id="q-name" for="w_name">Your name</label>
    <input id="w_name" type="text" maxlength="60" placeholder="Your name">
    <div class="gate-err" id="w_err"></div>
    <button class="go" id="fyGo">Show my schemes →</button>
    <button class="skip" id="fySkip">Skip — just browse everything</button>
  </div>
</div>

<div class="wrap" id="detailView" hidden>
  <button class="backbtn" id="backBtn">← <span id="t-back">All schemes</span></button>
  <div class="detail" id="detailBox"></div>
</div>

<footer id="foot"></footer>

// Consumer gate: a scheme's full details unlock once the visitor gives a
// mobile number (+ optional name) — no OTP, this is data collection, not
// identity verification. One server-side session per device, reusable across
// schemes and revisits, and pre-filled from the For You profile if given there.
let consumer=null;
function gateUnlocked(){return !!consumer;}
async function checkConsumer(){
  try{const r=await fetch("/api/consumer/me");consumer=r.ok?(await r.json()).consumer:null;}catch(e){}
  renderConsumer();
}
// Marketplace residents authenticate with phone + OTP via Clerk. On a completed
// sign-in we exchange the Clerk token for the app's consumer session (which also
// mirrors the user into Supabase), then unlock the scheme details.
async function initClerkConsumer(){
  let cfg={};
  try{cfg=await (await fetch("/api/config")).json();}catch(e){}
  if(!cfg.clerk_enabled)return;
  const s=document.createElement("script");
  s.setAttribute("data-clerk-publishable-key", cfg.clerk_publishable_key);
  s.async=true; s.crossOrigin="anonymous";
  s.src="https://"+cfg.clerk_frontend_api+"/npm/@clerk/clerk-js@5/dist/clerk.browser.js";
  s.addEventListener("load", async ()=>{
    try{
      await window.Clerk.load();
      window.__clerk=window.Clerk;
      window.Clerk.addListener(ev=>{ if(ev.user && window.Clerk.session) consumerExchange(); });
      if(window.Clerk.user) consumerExchange();
    }catch(e){}
  });
  document.head.appendChild(s);
}
async function consumerExchange(){
  try{
    const token=await window.Clerk.session.getToken();
    const r=await fetch("/api/clerk/me",{headers:{Authorization:"Bearer "+token}});
    if(!r.ok)return;
    await checkConsumer();
    try{if(window.Clerk.closeSignIn)window.Clerk.closeSignIn();}catch(_){}
    if(!document.getElementById("detailView").hidden)renderDetail();
  }catch(e){}
}
function renderConsumer(){
  const chip=document.getElementById("consumerChip");
  if(!chip)return;
  chip.hidden=!consumer;
  if(consumer)chip.textContent="👤 "+consumer.mobile+" ✕";
}
async function consumerLogout(){
  try{await fetch("/api/consumer/logout",{method:"POST"});}catch(e){}
  try{if(window.__clerk&&window.__clerk.signOut)await window.__clerk.signOut();}catch(e){}
  consumer=null;renderConsumer();
  if(!document.getElementById("detailView").hidden)renderDetail();
}
const PROFILE_FACET_KEYS=["who","state","age","gender","category","occupation","occupation_other","bpl","disability","rural"];
function facetsOf(obj){
  if(!obj)return undefined;
  const out={};
  PROFILE_FACET_KEYS.forEach(k=>{if(obj[k]!==undefined&&obj[k]!=="")out[k]=obj[k];});
  return Object.keys(out).length?out:undefined;
}
async function registerConsumer(mobile,name,context,extraProfile){
  try{
    const body={mobile,name:name||"",locale:lang,context:context||"",scheme_id:(detail&&detail.id)||""};
    const facets=facetsOf(extraProfile);
    if(facets)body.profile=facets;
    const r=await fetch("/api/consumer/register",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body)});
    if(!r.ok)return false;
    consumer=(await r.json()).consumer;renderConsumer();
    profile=Object.assign({},profile||{},facets||{},{mobile,name:name||(profile&&profile.name)||""});
    saveProfile(profile);
    return true;
  }catch(e){return false;}
}

const DATA_TIMEOUT_MS=15000;
let dataState="idle", dataError="";
function fallbackFacets(){return {occupations:[],benefit_types:[],version:"",total:0};}
function fetchJson(url){
  return fetch(url).then(r=>{if(!r.ok)throw new Error(url+" "+r.status);return r.json();});
}
function withTimeout(promise, ms){
  return new Promise((resolve,reject)=>{
    const t=setTimeout(()=>reject(new Error("timeout")),ms);
    promise.then(v=>{clearTimeout(t);resolve(v);},e=>{clearTimeout(t);reject(e);});
  });
}
function updateFooter(){
  const foot=document.getElementById("foot");
  foot.textContent=L("foot")+(FACETS&&FACETS.version||"")+" · "+(FACETS&&FACETS.total||0)+" schemes";

function showDataRetry(where){
  const html='<span>'+esc(L("loadFailed"))+'</span> <button class="bdg bg-tag" data-retry-data="1" style="border:none;cursor:pointer">'+esc(L("retry"))+'</button>';
  const target=document.getElementById(where||"count");
  if(target)target.innerHTML=html;
}
async function loadData(){
  dataState="loading";dataError="";
  try{
    const [f,meta]=await withTimeout(Promise.all([fetchJson("/api/facets"),fetchJson("/api/meta")]),DATA_TIMEOUT_MS);
    FACETS=f||fallbackFacets(); STATES=meta.states||[];
    dataState="ready";
    fillSelects(); updateFooter();
    return true;
  }catch(e){
    FACETS=FACETS||fallbackFacets(); STATES=STATES||[];
    dataState="error";dataError=e&&e.message||"load failed";
    showDataRetry("count");
    return false;
  }
}
let dataReady=loadData();
async function ensureData(){
  if(dataState==="ready")return true;
  if(dataState!=="loading")dataReady=loadData();
  return dataReady;
}

  toggleOccOther("w_occupation","w_occupation_other");
  document.getElementById("w_age").value=draft.age||"";
  document.getElementById("w_mobile").value=draft.mobile||"";
  document.getElementById("w_name").value=draft.name||"";
  document.getElementById("w_err").textContent="";
  document.getElementById("fyGo").disabled=false;
  renderSegs();
}
function commitWizard(){
  draft.state=document.getElementById("w_state").value;
  draft.age=document.getElementById("w_age").value;
  draft.occupation=document.getElementById("w_occupation").value;
  draft.occupation_other=draft.occupation==="other"?document.getElementById("w_occupation_other").value.trim():"";
  const mobileRaw=(document.getElementById("w_mobile").value||"").replace(/\D/g,"");
  const nameRaw=(document.getElementById("w_name").value||"").trim();
  if(mobileRaw && !/^[6-9]\d{9}$/.test(mobileRaw)){
    document.getElementById("w_err").textContent=L("wizBadMobile");
    return;
  }
  draft.mobile=mobileRaw; draft.name=nameRaw;
  profile=Object.assign({},draft);saveProfile(profile);
  markWizardSeen();
  hideModal();
  profileToControls(profile);
  runSearch();
  if(mobileRaw)registerConsumer(mobileRaw,nameRaw,"wizard",draft);
  const bn=document.getElementById("fyBanner");
  window.scrollTo({top:Math.max(0,bn.offsetTop-70),behavior:"smooth"});
}
function fyShareFn(){
  const cards=[...document.querySelectorAll(".scard .nm")].slice(0,6).map(e=>"• "+e.textContent);
  const txt=L("fyShareMsg")+"\n"+cards.join("\n")+"\n"+location.origin+"/";
  if(navigator.share){navigator.share({text:txt}).catch(()=>{});return;}
  window.open("https://wa.me/?text="+encodeURIComponent(txt),"_blank","noopener");
}
function showModal(){document.getElementById("fyModal").hidden=false;document.body.classList.add("modal-open");}
function markWizardSeen(){try{localStorage.setItem("sahej_fy_seen","1");}catch(e){}}
function hideModal(){document.getElementById("fyModal").hidden=true;document.body.classList.remove("modal-open");}
function browseEverything(){
  profile=null;saveProfile(null);document.getElementById("fyBanner").hidden=true;
  document.getElementById("clearBtn").click();
  markWizardSeen();
  hideModal();
}
document.getElementById("fyBtn").addEventListener("click",openWizard);
document.getElementById("fyClose").addEventListener("click",hideModal);
document.getElementById("fyModal").addEventListener("click",e=>{if(e.target.id==="fyModal")hideModal();});
document.getElementById("fyGo").addEventListener("click",commitWizard);
document.getElementById("fySkip").addEventListener("click",browseEverything);
document.getElementById("w_occupation").addEventListener("change",()=>toggleOccOther("w_occupation","w_occupation_other"));
document.getElementById("fyEdit").addEventListener("click",openWizard);
document.getElementById("fyShare").addEventListener("click",fyShareFn);
document.getElementById("fyClear").addEventListener("click",()=>{
  profile=null;saveProfile(null);document.getElementById("fyBanner").hidden=true;
  document.getElementById("clearBtn").click();
});

document.getElementById("consumerChip").addEventListener("click",consumerLogout);

if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{});}
init();
</script>
</body>
</html>
