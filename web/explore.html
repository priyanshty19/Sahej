<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sahej — every government scheme you're owed</title>
<meta name="description" content="Find every central and state government scheme you qualify for — filter by state, caste, gender, age, income, occupation. With deadlines, documents and where to apply.">
<meta name="theme-color" content="#0f7b6c">
<meta property="og:title" content="Sahej — every government scheme you're owed">
<meta property="og:description" content="हर योजना, हर हक़ — filter by who you are, see what you're owed.">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  :root{
    --bg:#f6f4ef; --panel:#fff; --ink:#1d2421; --muted:#6b7670; --line:#e4e0d7;
    --brand:#0f7b6c; --brand-soft:#e2f1ee; --gold:#b9821f; --gold-soft:#f7eed9;
    --danger:#a4453a; --danger-soft:#f5e2df; --info:#2f6dab; --info-soft:#e2ecf6;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5}
  header{background:var(--brand);color:#fff;padding:14px 18px}
  .hrow{max-width:1080px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  header h1{margin:0;font-size:20px}
  header p{margin:2px 0 0;font-size:12.5px;opacity:.92}
  .hbtns{display:flex;gap:8px}
  .hbtns a,.hbtns button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);
    padding:7px 12px;border-radius:8px;font-size:12.5px;cursor:pointer;text-decoration:none;display:inline-block}
  .hbtns a:hover,.hbtns button:hover{background:rgba(255,255,255,.28)}
  .wrap{max-width:1080px;margin:0 auto;padding:16px}
  /* search + filters */
  .searchbar{display:flex;gap:8px;margin-bottom:10px}
  .searchbar input{flex:1;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:15px;background:#fff}
  .filters{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:6px}
  .filters select,.filters input{width:100%;padding:9px 8px;border:1px solid var(--line);border-radius:9px;
    font-size:13px;background:#fff;color:var(--ink)}
  .filters label{font-size:11px;color:var(--muted);display:block;margin-bottom:2px}
  .ftogl{display:flex;gap:14px;align-items:center;font-size:12.5px;color:var(--muted);margin:6px 0 14px;flex-wrap:wrap}
  .ftogl label{display:flex;gap:5px;align-items:center;cursor:pointer}
  .count{font-size:12.5px;color:var(--muted);margin:2px 0 10px}
  .count b{color:var(--brand);font-size:14px}
  /* cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
  .scard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;
    display:flex;flex-direction:column;gap:6px}
  .scard:hover{border-color:var(--brand);box-shadow:0 2px 10px rgba(15,123,108,.08)}
  .scard .nm{font-weight:700;font-size:14.5px}
  .scard .nmhi{font-size:12.5px;color:var(--muted)}
  .scard .sum{font-size:12.5px;color:var(--ink);opacity:.85;flex:1}
  .scard .amt{font-weight:800;color:var(--brand);font-size:16px}
  .badges{display:flex;gap:5px;flex-wrap:wrap}
  .bdg{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:2px 7px;border-radius:20px}
  .bg-state{background:var(--info-soft);color:var(--info)}
  .bg-central{background:var(--brand-soft);color:var(--brand)}
  .bg-verify{background:var(--danger-soft);color:var(--danger)}
  .bg-new{background:var(--gold-soft);color:var(--gold)}
  .bg-tag{background:#f0ede6;color:var(--muted);text-transform:none;font-weight:600}
  .empty{background:var(--panel);border:1px dashed var(--line);border-radius:14px;padding:30px;text-align:center;color:var(--muted)}
  /* detail */
  .detail{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;max-width:760px;margin:0 auto}
  .backbtn{background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:14px;
    font-weight:600;color:var(--brand);cursor:pointer;margin-bottom:12px}
  .detail h2{margin:2px 0 2px;font-size:21px}
  .detail .nmhi{color:var(--muted);font-size:15px;margin-bottom:8px}
  .detail .amt{font-size:26px;font-weight:800;color:var(--brand);margin:8px 0 2px}
  .detail .amtnote{font-size:12.5px;color:var(--muted)}
  .sect{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  .sect h3{margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .sect p,.sect li{font-size:13.5px;margin:4px 0}
  .sect ul{margin:4px 0;padding-left:20px}
  .applybtn{display:inline-block;background:var(--brand);color:#fff;border:none;padding:11px 18px;border-radius:10px;
    font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;margin-top:6px}
  .warnbox{background:var(--danger-soft);border:1px solid var(--danger);color:var(--danger);border-radius:10px;
    padding:9px 12px;font-size:12.5px;margin-top:12px}
  .srcs a{font-size:12px;color:var(--info);word-break:break-all}
  .wabtn{display:inline-block;border:1px solid var(--brand);color:var(--brand);background:#fff;padding:10px 16px;
    border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer;text-decoration:none;margin:6px 6px 0 0}
  footer{max-width:1080px;margin:0 auto;padding:18px;font-size:11px;color:var(--muted)}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:4px}
  @media(max-width:640px){
    .filters{grid-template-columns:1fr 1fr}
    .searchbar input{font-size:16px} /* no iOS zoom */
  }
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div>
      <h1 id="t-title">Sahej · सहज</h1>
      <p id="t-tag">Every government scheme you're owed — by state, caste, age, income, occupation.</p>
    </div>
    <div class="hbtns">
      <button id="langBtn">हिन्दी</button>
      <a href="/asha" id="t-asha">ASHA tool</a>
      <a href="/about" id="t-about">Why Sahej</a>
    </div>
  </div>
</header>

<div class="wrap" id="listView">
  <div class="searchbar">
    <input id="q" type="search" placeholder="Search schemes… (pension, scholarship, घर, किसान)" aria-label="Search schemes">
  </div>
  <div class="filters">
    <div><label id="l-state" for="f_state">State / UT</label><select id="f_state"><option value="">All India</option></select></div>
    <div><label id="l-gender" for="f_gender">Gender</label><select id="f_gender"><option value="">Any</option></select></div>
    <div><label id="l-age" for="f_age">Age</label><input id="f_age" type="number" min="0" max="110" placeholder="—"></div>
    <div><label id="l-cat" for="f_category">Category</label><select id="f_category"><option value="">Any</option></select></div>
    <div><label id="l-occ" for="f_occupation">Occupation</label><select id="f_occupation"><option value="">Any</option></select></div>
    <div><label id="l-btype" for="f_benefit_type">Benefit type</label><select id="f_benefit_type"><option value="">Any</option></select></div>
  </div>
  <div class="ftogl">
    <label><input type="checkbox" id="f_bpl"> <span id="l-bpl">BPL / priority household</span></label>
    <label><input type="checkbox" id="f_disability"> <span id="l-dis">Person with disability</span></label>
    <label><input type="checkbox" id="f_rural"> <span id="l-rural">Rural</span></label>
    <button class="bdg bg-tag" id="clearBtn" style="border:none;cursor:pointer;font-size:11.5px">✕ <span id="t-clear">Clear filters</span></button>
  </div>
  <div class="count" id="count" role="status"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="wrap" id="detailView" hidden>
  <button class="backbtn" id="backBtn">← <span id="t-back">All schemes</span></button>
  <div class="detail" id="detailBox"></div>
</div>

<footer id="foot"></footer>

<script>
const I18N={
 en:{tag:"Every government scheme you're owed — by state, caste, age, income, occupation.",
  asha:"ASHA tool",about:"Why Sahej",lang:"हिन्दी",search:"Search schemes… (pension, scholarship, घर, किसान)",
  state:"State / UT",gender:"Gender",age:"Age",cat:"Category",occ:"Occupation",btype:"Benefit type",
  bpl:"BPL / priority household",dis:"Person with disability",rural:"Rural",clear:"Clear filters",
  found:"schemes match",back:"All schemes",apply:"How to apply",applyAt:"Where",online:"Online portal",
  docs:"Documents needed",grv:"If it's stuck / complaint",srcs:"Sources",excl:"Not eligible if",
  verify:"Amounts and rules are research-grade — confirm at the office / official portal before relying on them.",
  eligible:"Who it's for",share:"Share on WhatsApp",openAsha:"Track this in the ASHA tool",
  central:"Central",statebdg:"State",new_:"New",verifybdg:"Verify",
  anyG:"Any",female:"Female",male:"Male",anyC:"Any",general:"General",obc:"OBC",sc:"SC",st:"ST",
  allIndia:"All India",none:"No schemes match these filters — try removing one.",
  foot:"Sahej shows entitlements with sources and honesty flags. Rules marked “verify” must be confirmed against current government orders. Not legal advice. Catalog v"},
 hi:{tag:"आपका हर सरकारी हक़ — राज्य, वर्ग, उम्र, आय, पेशे के हिसाब से।",
  asha:"आशा टूल",about:"सहज क्यों",lang:"English",search:"योजना खोजें… (पेंशन, छात्रवृत्ति, घर, किसान)",
  state:"राज्य / केंद्रशासित",gender:"लिंग",age:"उम्र",cat:"श्रेणी",occ:"पेशा",btype:"लाभ का प्रकार",
  bpl:"बीपीएल / प्राथमिकता परिवार",dis:"दिव्यांगजन",rural:"ग्रामीण",clear:"फ़िल्टर हटाएँ",
  found:"योजनाएँ मिलीं",back:"सभी योजनाएँ",apply:"आवेदन कैसे करें",applyAt:"कहाँ",online:"ऑनलाइन पोर्टल",
  docs:"आवश्यक दस्तावेज़",grv:"अटकने पर / शिकायत",srcs:"स्रोत",excl:"अपात्र यदि",
  verify:"राशियाँ व नियम शोध-स्तर के हैं — भरोसा करने से पहले कार्यालय/आधिकारिक पोर्टल पर पुष्टि करें।",
  eligible:"किनके लिए",share:"व्हाट्सऐप पर भेजें",openAsha:"आशा टूल में ट्रैक करें",
  central:"केंद्रीय",statebdg:"राज्य",new_:"नई",verifybdg:"पुष्टि करें",
  anyG:"कोई भी",female:"महिला",male:"पुरुष",anyC:"कोई भी",general:"सामान्य",obc:"ओबीसी",sc:"एससी",st:"एसटी",
  allIndia:"पूरा भारत",none:"इन फ़िल्टरों से कोई योजना नहीं मिली — एक हटाकर देखें।",
  foot:"सहज हर हक़ स्रोतों और ईमानदारी-चिह्नों के साथ दिखाता है। “पुष्टि करें” वाले नियम सरकारी आदेशों से मिलाएँ। कानूनी सलाह नहीं। कैटलॉग v"}
};
const OCC_LABELS={farmer:["Farmer","किसान"],student:["Student","विद्यार्थी"],construction_worker:["Construction worker","निर्माण श्रमिक"],
 street_vendor:["Street vendor","रेहड़ी-पटरी"],artisan:["Artisan","कारीगर"],unorganised:["Unorganised worker","असंगठित कामगार"],
 fisher:["Fisher","मछुआरा"],dairy:["Dairy","डेयरी"],domestic_worker:["Domestic worker","घरेलू कामगार"],gig_worker:["Gig worker","गिग कामगार"]};
const BT_LABELS={cash:["Cash","नकद"],pension:["Pension","पेंशन"],insurance:["Insurance","बीमा"],loan:["Loan","ऋण"],
 scholarship:["Scholarship","छात्रवृत्ति"],housing:["Housing","आवास"],in_kind:["In kind","वस्तु/सेवा"],
 document:["Document","दस्तावेज़"],service:["Service","सेवा"],savings:["Savings","बचत"]};

let lang=localStorage.getItem("sahej_lang")==="hi"?"hi":"en";
let FACETS=null, STATES=[], detail=null, t=null;
const L=k=>I18N[lang][k];
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const rupees=n=>"₹"+Number(n).toLocaleString("en-IN");

function applyLang(){
  document.getElementById("t-tag").textContent=L("tag");
  document.getElementById("langBtn").textContent=L("lang");
  document.getElementById("t-asha").textContent=L("asha");
  document.getElementById("t-about").textContent=L("about");
  document.getElementById("q").placeholder=L("search");
  for(const [id,k] of [["l-state","state"],["l-gender","gender"],["l-age","age"],["l-cat","cat"],
    ["l-occ","occ"],["l-btype","btype"],["l-bpl","bpl"],["l-dis","dis"],["l-rural","rural"],
    ["t-clear","clear"],["t-back","back"]])
    document.getElementById(id).textContent=L(k);
  fillSelects();
}
function opt(v,label){return '<option value="'+esc(v)+'">'+esc(label)+'</option>';}
function fillSelects(){
  const st=document.getElementById("f_state"), cur=st.value;
  st.innerHTML=opt("",L("allIndia"))+STATES.map(s=>opt(s.code,s.name)).join("");st.value=cur;
  const g=document.getElementById("f_gender"), gv=g.value;
  g.innerHTML=opt("",L("anyG"))+opt("female",L("female"))+opt("male",L("male"));g.value=gv;
  const c=document.getElementById("f_category"), cv=c.value;
  c.innerHTML=opt("",L("anyC"))+["general","obc","sc","st"].map(x=>opt(x,L(x))).join("");c.value=cv;
  const o=document.getElementById("f_occupation"), ov=o.value;
  o.innerHTML=opt("",L("anyG"))+(FACETS?FACETS.occupations:[]).map(x=>
    opt(x,(OCC_LABELS[x]||[x,x])[lang==="hi"?1:0])).join("");o.value=ov;
  const b=document.getElementById("f_benefit_type"), bv=b.value;
  b.innerHTML=opt("",L("anyG"))+(FACETS?FACETS.benefit_types:[]).map(x=>
    opt(x,(BT_LABELS[x]||[x,x])[lang==="hi"?1:0])).join("");b.value=bv;
}
function filters(){
  const f={};
  const q=document.getElementById("q").value.trim(); if(q)f.q=q;
  const m={state:"f_state",gender:"f_gender",age:"f_age",category:"f_category",
           occupation:"f_occupation",benefit_type:"f_benefit_type"};
  for(const k in m){const v=document.getElementById(m[k]).value;if(v)f[k]=v;}
  if(document.getElementById("f_bpl").checked)f.bpl="true";
  if(document.getElementById("f_disability").checked)f.disability="true";
  if(document.getElementById("f_rural").checked)f.residence="rural";
  return f;
}
async function runSearch(){
  const f=filters();
  const qs=new URLSearchParams(f).toString();
  try{
    const r=await(await fetch("/api/schemes"+(qs?"?"+qs:""))).json();
    renderList(r);
  }catch(e){
    document.getElementById("grid").innerHTML='<div class="empty">Offline — could not load schemes.</div>';
  }
}
function badgeRow(s){
  let b="";
  b+=s.level==="state"?'<span class="bdg bg-state">'+esc(s.state||L("statebdg"))+'</span>'
                      :'<span class="bdg bg-central">'+L("central")+'</span>';
  if(s.status==="new")b+='<span class="bdg bg-new">'+L("new_")+'</span>';
  if(s.needs_verification)b+='<span class="bdg bg-verify">'+L("verifybdg")+'</span>';
  (s.tags||[]).slice(0,3).forEach(t=>{b+='<span class="bdg bg-tag">'+esc(t)+'</span>';});
  return b;
}
function amountLine(s){
  const b=s.benefit||{};
  if(!b.amount_inr)return b.amount_note?'<div class="amt" style="font-size:13px">'+esc(b.amount_note)+'</div>':"";
  const per=b.period==="month"?(lang==="hi"?"/माह":"/mo"):b.period==="year"?(lang==="hi"?"/वर्ष":"/yr"):"";
  return '<div class="amt">'+rupees(b.amount_inr)+per+'</div>';
}
function renderList(r){
  const grid=document.getElementById("grid");
  document.getElementById("count").innerHTML="<b>"+r.total+"</b> "+L("found");
  if(!r.schemes.length){grid.innerHTML='<div class="empty">'+L("none")+'</div>';return;}
  grid.innerHTML=r.schemes.map(s=>
    '<div class="scard" data-id="'+esc(s.id)+'" role="button" tabindex="0">'
    +'<div class="badges">'+badgeRow(s)+'</div>'
    +'<div class="nm">'+esc(lang==="hi"&&s.name_hi?s.name_hi:s.name)+'</div>'
    +(s.name_hi?'<div class="nmhi">'+esc(lang==="hi"?s.name:s.name_hi)+'</div>':"")
    +'<div class="sum">'+esc(lang==="hi"&&s.summary_hi?s.summary_hi:s.summary)+'</div>'
    +amountLine(s)+'</div>').join("");
  grid.querySelectorAll(".scard").forEach(c=>{
    const open=()=>openDetail(c.dataset.id,true);
    c.addEventListener("click",open);
    c.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();open();}});
  });
}
async function openDetail(id,push){
  try{
    const r=await fetch("/api/scheme/"+encodeURIComponent(id));
    if(!r.ok)return;
    detail=await r.json();
  }catch(e){return;}
  if(push)history.pushState({id:id},"","/scheme/"+encodeURIComponent(id));
  renderDetail();
}
function renderDetail(){
  const s=detail; if(!s)return;
  document.getElementById("listView").hidden=true;
  document.getElementById("detailView").hidden=false;
  window.scrollTo(0,0);
  const fc=s.facets||{}, b=s.benefit||{};
  let who=[];
  if(fc.gender&&fc.gender[0]!=="any")who.push(fc.gender.map(g=>L(g)||g).join("/"));
  if(fc.age_min!=null||fc.age_max!=null)who.push((lang==="hi"?"उम्र ":"age ")+(fc.age_min??"")+"–"+(fc.age_max??""));
  if(fc.category)who.push(fc.category.map(c=>String(c).toUpperCase()).join("/"));
  if(fc.occupation)who.push(fc.occupation.map(o=>(OCC_LABELS[o]||[o,o])[lang==="hi"?1:0]).join(", "));
  if(fc.income==="bpl")who.push("BPL");
  if(fc.income==="income_cap"&&fc.income_cap_inr)who.push((lang==="hi"?"आय ≤ ":"income ≤ ")+rupees(fc.income_cap_inr)+"/yr");
  if(fc.residence)who.push(fc.residence.join("/"));
  if(fc.disability===true)who.push(lang==="hi"?"दिव्यांगजन":"persons with disability");
  const per=b.period==="month"?(lang==="hi"?" प्रति माह":" per month"):b.period==="year"?(lang==="hi"?" प्रति वर्ष":" per year"):"";
  const url=(s.apply||{}).url;
  const shareTxt=(lang==="hi"&&s.name_hi?s.name_hi:s.name)+" — "
    +(lang==="hi"&&s.summary_hi?s.summary_hi:s.summary)+" "+location.origin+"/scheme/"+s.id;
  document.getElementById("detailBox").innerHTML=
    '<div class="badges">'+badgeRow(s)+'</div>'
    +'<h2>'+esc(lang==="hi"&&s.name_hi?s.name_hi:s.name)+'</h2>'
    +(s.name_hi?'<div class="nmhi">'+esc(lang==="hi"?s.name:s.name_hi)+'</div>':"")
    +(b.amount_inr?'<div class="amt">'+rupees(b.amount_inr)+per+'</div>':"")
    +(b.amount_note?'<div class="amtnote">'+esc(b.amount_note)+'</div>':"")
    +'<p style="font-size:14px">'+esc(lang==="hi"&&s.summary_hi?s.summary_hi:s.summary)+'</p>'
    +(s.note?'<p style="font-size:12.5px;color:var(--muted)">'+esc(s.note)+'</p>':"")
    +(who.length?'<div class="sect"><h3>'+L("eligible")+'</h3><p>'+esc(who.join(" · "))+'</p></div>':"")
    +(s.exclusions?'<div class="sect"><h3>'+L("excl")+'</h3><p>'+esc(s.exclusions)+'</p></div>':"")
    +'<div class="sect"><h3>'+L("apply")+'</h3>'
      +((s.apply||{}).at?'<p><b>'+L("applyAt")+':</b> '+esc(s.apply.at)+'</p>':"")
      +(url?'<a class="applybtn" href="'+esc(url)+'" target="_blank" rel="noopener">'+L("online")+' ↗</a>':"")
      +(s.deep_link?' <a class="applybtn" style="background:#fff;color:var(--brand);border:1px solid var(--brand)" href="'+esc(s.deep_link)+'">'+L("openAsha")+'</a>':"")
    +'</div>'
    +((s.documents||[]).length?'<div class="sect"><h3>'+L("docs")+'</h3><ul>'
      +s.documents.map(d=>'<li>'+esc(d)+'</li>').join("")+'</ul></div>':"")
    +(s.grievance?'<div class="sect"><h3>'+L("grv")+'</h3><p>'+esc(s.grievance)+'</p></div>':"")
    +'<a class="wabtn" href="https://wa.me/?text='+encodeURIComponent(shareTxt)+'" target="_blank" rel="noopener">'+L("share")+'</a>'
    +(s.needs_verification?'<div class="warnbox">⚠ '+L("verify")+'</div>':"")
    +((s.source_urls||[]).length?'<div class="sect srcs"><h3>'+L("srcs")+'</h3>'
      +s.source_urls.map(u=>'<a href="'+esc(u)+'" target="_blank" rel="noopener">'+esc(u)+'</a><br>').join("")+'</div>':"");
}
function closeDetail(push){
  detail=null;
  document.getElementById("detailView").hidden=true;
  document.getElementById("listView").hidden=false;
  if(push)history.pushState({},"","/");
}
window.addEventListener("popstate",()=>{
  const m=location.pathname.match(/^\/scheme\/([A-Za-z0-9_-]+)$/);
  if(m)openDetail(m[1],false); else closeDetail(false);
});

async function init(){
  applyLang();
  try{
    const [f,meta]=await Promise.all([
      (await fetch("/api/facets")).json(),
      (await fetch("/api/meta")).json()]);
    FACETS=f; STATES=meta.states||[];
  }catch(e){FACETS={occupations:[],benefit_types:[]};}
  fillSelects();
  const foot=document.getElementById("foot");
  foot.textContent=L("foot")+(FACETS.version||"")+" · "+(FACETS.total||0)+" schemes";
  const m=location.pathname.match(/^\/scheme\/([A-Za-z0-9_-]+)$/);
  if(m)openDetail(m[1],false);
  runSearch();
}
let deb=null;
function onChange(){clearTimeout(deb);deb=setTimeout(runSearch,220);}
["q","f_age"].forEach(id=>document.getElementById(id).addEventListener("input",onChange));
["f_state","f_gender","f_category","f_occupation","f_benefit_type"].forEach(id=>
  document.getElementById(id).addEventListener("change",runSearch));
["f_bpl","f_disability","f_rural"].forEach(id=>
  document.getElementById(id).addEventListener("change",runSearch));
document.getElementById("clearBtn").addEventListener("click",()=>{
  document.getElementById("q").value="";document.getElementById("f_age").value="";
  ["f_state","f_gender","f_category","f_occupation","f_benefit_type"].forEach(id=>document.getElementById(id).value="");
  ["f_bpl","f_disability","f_rural"].forEach(id=>document.getElementById(id).checked=false);
  runSearch();
});
document.getElementById("backBtn").addEventListener("click",()=>closeDetail(true));
document.getElementById("langBtn").addEventListener("click",()=>{
  lang=lang==="en"?"hi":"en";localStorage.setItem("sahej_lang",lang);
  applyLang();
  const foot=document.getElementById("foot");
  foot.textContent=L("foot")+(FACETS&&FACETS.version||"")+" · "+(FACETS&&FACETS.total||0)+" schemes";
  if(detail)renderDetail();else runSearch();
});
if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{});}
init();
</script>
</body>
</html>
